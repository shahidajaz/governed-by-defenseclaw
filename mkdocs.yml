site_name: DefenseClaw + OpenClaw on DGX Spark
site_description: Governed by Cisco DefenseClaw Stack
site_url: https://articles.theacmeai.com/defenseclaw/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

# Click-to-edit bridge: when this site is embedded in the Decap editor's live
# preview pane, every heading + paragraph becomes clickable. A click postMessages
# to the parent (Decap admin) which scrolls the WYSIWYG editor to that block.
# Inert when the site is loaded directly (top window).
extra_javascript:
  - javascripts/edit-bridge.js

nav:
  - Home: index.md
  - DefenseClaw:
    - part1/index.md
    - Base install:
      - Step 1 — Prereqs: part1/01-prereqs.md
      - Step 2 — Install OpenClaw + DefenseClaw: part1/02-install.md
      - Step 3 — Set up your model: part1/03-setup-model.md
    - Wire it up:
      - Step 4A — Cloud: part1/04a-cloud.md
      - Step 4B — vLLM/Ollama: part1/04b-vllm.md
      - Step 5 — Sandbox-native: part1/05-sandbox.md
      - Step 6 — Action mode: part1/06-action-mode.md
    - Observation tools:
      - Step 7 — Splunk: part1/07-splunk.md
      - Step 8 — Scanners: part1/08-scanners.md
      - Step 9 — Observability: part1/09-observability.md
  - Telegram:
    - Overview: part2/index.md
    - Setup:
      - Step 1 — Create bot: part2/phase-1.md
      - Step 2 — Add channel: part2/phase-2.md
      - Step 3 — Lock down: part2/phase-3.md
    - Verify + wrap-up:
      - Step 4 — Chat + governance: part2/phase-4.md
      - Step 5 — Catch injection: part2/phase-5.md
  - Webex:
    - Overview: part3/index.md
    - Setup:
      - Step 0 — Prereqs: part3/phase-0.md
      - Step 1 — OAuth: part3/phase-1.md
      - Step 2 — Tools: part3/phase-2.md
      - Agent persona: part3/persona.md
    - Stages:
      - Stage 1 — Read: part3/phase-3.md
      - Stage 2 — Needs me: part3/phase-4.md
      - Stage 3 — Cluster: part3/phase-5.md
      - Stage 4 — Rank: part3/phase-6.md
      - Stage 5 — Meetings: part3/phase-7.md
      - Stage 6 — Drafts: part3/phase-8.md
    - Wrap-up:
      - Step 9 — Digest: part3/phase-9.md
      - Step 10 — Governance: part3/phase-10.md
      - Optional — Webhooks: part3/webhooks.md
      - Skill template: part3/skill-template.md
