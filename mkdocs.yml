site_name: DefenseClaw + OpenClaw on DGX Spark
site_description: Governed by Cisco DefenseClaw Stack
docs_dir: docs

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Source Serif Pro
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Part 1 — DefenseClaw:
    - Part 1 — Overview: part1/index.md
    - Step 1 — Prerequisites: part1/01-prereqs.md
    - Step 2 — Install: part1/02-install.md
    - Step 3 — Set up your model:
      - Pick your model: part1/03-setup-model.md
      - Anthropic: part1/step3-anthropic.md
      - OpenAI: part1/step3-openai.md
      - vLLM: part1/step3-vllm.md
      - Ollama: part1/step3-ollama.md
    - Step 5 — Sandbox-native: part1/05-sandbox.md
    - Step 6 — Action mode: part1/06-action-mode.md
    - Step 7 — Splunk dashboard: part1/07-splunk.md
    - Step 8 — Scanners: part1/08-scanners.md
    - Step 9 — Observability: part1/09-observability.md
  - Part 2 — Telegram:
    - Part 2 — Overview: part2/index.md
    - Step 1 — Create bot: part2/phase-1.md
    - Step 2 — Add channel: part2/phase-2.md
    - Step 3 — Lock it down: part2/phase-3.md
    - Step 4 — Verify governance: part2/phase-4.md
    - Step 5 — Catch injection: part2/phase-5.md
  - Part 3 — Webex:
    - Part 3 — Overview: part3/index.md
    - Step 0 — Prereqs: part3/phase-0.md
    - Step 1 — OAuth: part3/phase-1.md
    - Step 2 — Wire tools: part3/phase-2.md
    - Step 2.5 — Agent persona: part3/persona.md
    - Stage 1 — Read: part3/phase-3.md
    - Stage 2 — Needs me: part3/phase-4.md
    - Stage 3 — Cluster: part3/phase-5.md
    - Stage 4 — Rank: part3/phase-6.md
    - Stage 5 — Meetings: part3/phase-7.md
    - Stage 6 — Drafts: part3/phase-8.md
    - Step 9 — Assemble digest: part3/phase-9.md
    - Step 10 — Governance: part3/phase-10.md
    - Skill template: part3/skill-template.md
    - Optional — Webhooks: part3/webhooks.md
